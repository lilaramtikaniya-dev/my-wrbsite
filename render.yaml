services:
  # ── Backend (Express + TypeScript) ──────────────────────────────
  - type: web
    name: jsforge-api
    env: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false

  # ── Frontend (Next.js 15) ───────────────────────────────────────
  - type: web
    name: jsforge-frontend
    env: node
    plan: free
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false           # Set this manually to your backend Render URL
      - key: NEXT_PUBLIC_APP_URL
        sync: false           # Set this manually to your frontend Render URL
